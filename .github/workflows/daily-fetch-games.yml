name: Daily Fetch New Games

on:
  schedule:
    # Chạy lúc 6:00 UTC mỗi ngày (13:00 giờ Việt Nam)
    - cron: "0 6 * * *"
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  fetch-games:
    runs-on: ubuntu-latest
    steps:
      - name: Call fetch-games API
        env:
          API_URL: ${{ secrets.VERCEL_URL }}
          ADMIN_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
        run: |
          curl -X POST "${API_URL}/api/fetch-games?key=${ADMIN_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 300
