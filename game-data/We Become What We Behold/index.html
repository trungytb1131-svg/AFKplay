<html>
  <head>
    <link rel="stylesheet" href="css/game.css" />
  </head>
  <body>
    <!-- DEBUG -->
    <div
      id="debug_log"
      style="
        position: fixed;
        top: 0;
        left: 0;
        z-index: 99999;
        background: rgba(0, 0, 0, 0.9);
        color: #0f0;
        font: 11px monospace;
        padding: 6px;
        max-width: 100%;
        pointer-events: none;
      "
    ></div>

    <div id="stage"></div>
    <div id="modal_shade"></div>
    <div class="overlay" id="warning">
      <div dir="rtl">ای بابا!</div>
      <div dir="rtl">
        your browser doesn't support webgl.<br />
        try a different browser or computer?<br />
        <br />
        مرورگر شما مرخص است! از یه مرورگر و یا کامپیوتر دیگه استفاده کنید!
      </div>
    </div>
    <div class="overlay" id="paused">
      <div>paused</div>
      <div dir="rtl">
        click anywhere to resume<br />
        برای بازگشت رو یه جا رو کلیک کن!
      </div>
    </div>
  </body>
</html>

<!-- Game Scripts -->
<script>
  // Debug logger
  window._log = function (msg) {
    var d = document.getElementById("debug_log");
    if (d) d.innerHTML += msg + "<br>";
    console.log("[WBWWB]", msg);
  };
  _log("All scripts loaded. PIXI=" + typeof PIXI + " Game=" + typeof Game);

  Game.stats = false;
  window.onload = function () {
    _log("window.onload fired");
    try {
      _log("Calling Game.init()...");
      Game.init();
      _log("Game.init() completed");
    } catch (e) {
      _log("ERROR: " + e.message);
      document.getElementById("warning").style.display = "block";
    }
  };
  window.SHARE_TEXT = "همین الان یه بازی خیلی خفن رو بازی کردم";
  window.SHARE_URL = "";
</script>
