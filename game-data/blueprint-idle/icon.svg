<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark blueprint paper background with subtle grid + golden schematic icon. -->
  <rect width="512" height="512" fill="#0d3b4f"/>
  <g stroke="#1a5a7a" stroke-width="1" opacity="0.6">
    <line x1="0"   y1="64"  x2="512" y2="64"/>
    <line x1="0"   y1="128" x2="512" y2="128"/>
    <line x1="0"   y1="192" x2="512" y2="192"/>
    <line x1="0"   y1="256" x2="512" y2="256"/>
    <line x1="0"   y1="320" x2="512" y2="320"/>
    <line x1="0"   y1="384" x2="512" y2="384"/>
    <line x1="0"   y1="448" x2="512" y2="448"/>
    <line x1="64"  y1="0"   x2="64"  y2="512"/>
    <line x1="128" y1="0"   x2="128" y2="512"/>
    <line x1="192" y1="0"   x2="192" y2="512"/>
    <line x1="256" y1="0"   x2="256" y2="512"/>
    <line x1="320" y1="0"   x2="320" y2="512"/>
    <line x1="384" y1="0"   x2="384" y2="512"/>
    <line x1="448" y1="0"   x2="448" y2="512"/>
  </g>
  <!-- Central schematic: interlocking gear/diamond motif -->
  <g transform="translate(256 256)" fill="none" stroke="#ffd670" stroke-width="10" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="0,-140 120,0 0,140 -120,0"/>
    <circle cx="0" cy="0" r="60"/>
    <line x1="-60" y1="0" x2="-120" y2="0"/>
    <line x1="60"  y1="0" x2="120"  y2="0"/>
    <line x1="0" y1="-60" x2="0" y2="-120"/>
    <line x1="0" y1="60"  x2="0" y2="120"/>
  </g>
  <!-- Corner tick marks (drafting-sheet style) -->
  <g stroke="#ffd670" stroke-width="4" fill="none">
    <path d="M 32 32 L 72 32 L 72 32 M 32 32 L 32 72"/>
    <path d="M 480 32 L 440 32 M 480 32 L 480 72"/>
    <path d="M 32 480 L 72 480 M 32 480 L 32 440"/>
    <path d="M 480 480 L 440 480 M 480 480 L 480 440"/>
  </g>
</svg>
