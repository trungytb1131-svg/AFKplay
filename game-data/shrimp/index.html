<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, minimum-scale=1, maximum-scale=1"
    />
    <title></title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #adecf5;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .game-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        overflow: hidden;
      }
      canvas#canvas {
        max-width: 100% !important;
        max-height: 100% !important;
        object-fit: contain;
      }
      .credits-bar {
        width: 100%;
        max-width: 960px;
        font-family: sans-serif;
        color: #fff;
        background: #1a1a1a;
        padding: 10px 15px;
        border-radius: 8px;
        margin: 6px auto;
        text-align: left;
        flex-shrink: 0;
      }
      .credits-bar p {
        margin: 0;
        font-size: 13px;
        color: #aaa;
        line-height: 1.4;
      }
      .credits-bar .title {
        font-size: 14px;
        font-weight: bold;
        color: #fff;
        margin-bottom: 3px;
      }
    </style>

    <!-- Load custom style sheet -->
    <link rel="stylesheet" type="text/css" href="theme/love.css" />
  </head>
  <body>
    <div class="game-area">
      <canvas
        id="loadingCanvas"
        oncontextmenu="event.preventDefault()"
        width="960"
        height="540"
      ></canvas>
      <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>
    <div class="credits-bar">
      <p class="title">Credits & Original Game</p>
      <p>
        "1,000,000 Shrimp" is developed by <strong>Jon Topielski</strong>.
        If you enjoy the game, please support the creator by visiting his <a href="https://jontopielski.com/" target="_blank" style="color: #4fd1c5; text-decoration: none;">Official Website</a>
        or checking out the original release on <a href="https://jontopielski.itch.io/1000000-shrimp" target="_blank" style="color: #4fd1c5; text-decoration: none;">Itch.io</a>.
      </p>
    </div>
  </body>

    <script type="text/javascript">
      function goFullScreen() {
        var canvas = document.getElementById("canvas");
        if (canvas.requestFullScreen) canvas.requestFullScreen();
        else if (canvas.webkitRequestFullScreen)
          canvas.webkitRequestFullScreen();
        else if (canvas.mozRequestFullScreen) canvas.mozRequestFullScreen();
      }
      function FullScreenHook() {
        var canvas = document.getElementById("canvas");
        canvas.width =
          window.innerWidth ||
          document.documentElement.clientWidth ||
          document.body.clientWidth;
        canvas.height =
          window.innerHeight ||
          document.documentElement.clientHeight ||
          document.body.clientHeight;
      }
      var loadingContext = document
        .getElementById("loadingCanvas")
        .getContext("2d");
      function drawLoadingText(text) {
        var canvas = loadingContext.canvas;

        loadingContext.fillStyle = "rgb(142, 195, 227)";
        loadingContext.fillRect(0, 0, canvas.scrollWidth, canvas.scrollHeight);

        loadingContext.font = "2em arial";
        loadingContext.textAlign = "center";
        loadingContext.fillStyle = "rgb( 11, 86, 117 )";
        loadingContext.fillText(
          text,
          canvas.scrollWidth / 2,
          canvas.scrollHeight / 2,
        );

        loadingContext.fillText(
          "Powered By Emscripten.",
          canvas.scrollWidth / 2,
          canvas.scrollHeight / 4,
        );
        loadingContext.fillText(
          "Powered By LÖVE.",
          canvas.scrollWidth / 2,
          (canvas.scrollHeight / 4) * 3,
        );
      }

      window.onload = function () {
        window.focus();
      };
      window.onclick = function () {
        window.focus();
      };

      window.addEventListener(
        "keydown",
        function (e) {
          // space and arrow keys
          if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) {
            e.preventDefault();
          }
        },
        false,
      );

      var Module = {
        arguments: ["./game.love"],
        INITIAL_MEMORY: 1000000000,
        printErr: console.error.bind(console),
        canvas: (function () {
          var canvas = document.getElementById("canvas");

          // As a default initial behavior, pop up an alert when webgl context is lost. To make your
          // application robust, you may want to override this behavior before shipping!
          // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
          canvas.addEventListener(
            "webglcontextlost",
            function (e) {
              alert("WebGL context lost. You will need to reload the page.");
              e.preventDefault();
            },
            false,
          );

          return canvas;
        })(),
        setStatus: function (text) {
          if (text) {
            drawLoadingText(text);
          } else if (Module.remainingDependencies === 0) {
            document.getElementById("loadingCanvas").style.display = "none";
            document.getElementById("canvas").style.visibility = "visible";
          }
        },
        totalDependencies: 0,
        remainingDependencies: 0,
        monitorRunDependencies: function (left) {
          this.remainingDependencies = left;
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(
            left
              ? "Preparing... (" +
                  (this.totalDependencies - left) +
                  "/" +
                  this.totalDependencies +
                  ")"
              : "All downloads complete.",
          );
        },
      };
      Module.setStatus("Downloading...");
      window.onerror = function (event) {
        // TODO: do not warn on ok events like simulating an infinite loop or exitStatus
        Module.setStatus("Exception thrown, see JavaScript console");
        Module.setStatus = function (text) {
          if (text) Module.printErr("[post-exception status] " + text);
        };
      };

      var applicationLoad = function (e) {
        Love(Module);
      };
    </script>
    <script type="text/javascript" src="game.js"></script>
    <script
      async
      type="text/javascript"
      src="love.js"
      onload="applicationLoad(this)"
    ></script>
    <footer></footer>
  </body>
</html>
